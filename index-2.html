<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e0ddd5;
    --text: #1a1a18;
    --text-muted: #888880;
    --user-bg: #1a1a18;
    --user-text: #f7f6f2;
    --assistant-bg: #eceae3;
    --assistant-text: #1a1a18;
    --accent: #2d6a4f;
    --accent-hover: #1b4332;
    --error: #c0392b;
    --radius: 12px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 760px;
    margin: 0 auto;
    padding: 0;
  }

  /* ── Header ── */
  #header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  #header h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  #session-label {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* ── Conversation log ── */
  #conversation-log {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  #conversation-log:empty::before {
    content: "Inizia la conversazione…";
    display: block;
    text-align: center;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    margin-top: 40px;
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 88%;
    animation: fadeUp 0.22s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user  { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }

  .msg-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .msg.user .msg-label { text-align: right; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .msg-bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 3px;
  }

  .msg.assistant .msg-bubble {
    background: var(--assistant-bg);
    color: var(--assistant-text);
    border-bottom-left-radius: 3px;
  }

  .msg-time {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .msg.user .msg-time { text-align: right; }

  /* ── Typing indicator ── */
  #typing {
    display: none;
    align-self: flex-start;
    padding: 12px 16px;
    background: var(--assistant-bg);
    border-radius: var(--radius);
    border-bottom-left-radius: 3px;
    gap: 5px;
    align-items: center;
  }
  #typing.visible { display: flex; }
  #typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  #typing span:nth-child(2) { animation-delay: 0.2s; }
  #typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
    40%           { transform: scale(1);   opacity: 1; }
  }

  /* ── Input area ── */
  #input-area {
    padding: 14px 20px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  #input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    max-height: 140px;
    overflow-y: auto;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    flex-shrink: 0;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    font-size: 16px;
  }
  #send-btn:hover:not(:disabled) { background: var(--accent-hover); transform: scale(1.05); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  #status-bar {
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    min-height: 14px;
  }
  #status-bar.error { color: var(--error); }

  /* ── Saving badge ── */
  #save-indicator {
    display: inline-block;
    margin-left: 8px;
    font-family: var(--mono);
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.3s;
    color: var(--accent);
  }
  #save-indicator.visible { opacity: 1; }

  /* scrollbar */
  #conversation-log::-webkit-scrollbar { width: 4px; }
  #conversation-log::-webkit-scrollbar-track { background: transparent; }
  #conversation-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="dot"></div>
    <h1>CHAT ASSISTANT</h1>
    <span id="session-label">—</span>
  </div>

  <div id="conversation-log" role="log" aria-live="polite"></div>

  <div id="typing" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea
        id="user-input"
        rows="2"
        placeholder="Scrivi il tuo messaggio…"
        aria-label="Messaggio"
      ></textarea>
      <button id="send-btn" aria-label="Invia">&#9658;</button>
    </div>
    <div id="status-bar">
      <span id="status-text"></span>
      <span id="save-indicator">✓ salvato</span>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  CONFIGURATION — edit these values
// ════════════════════════════════════════════
const CONFIG = {
  OPENAI_API_KEY:  "",          // ← la tua chiave OpenAI
  OPENAI_MODEL:    "gpt-4o-2024-05-13",             // ← modello OpenAI
  SYSTEM_PROMPT:   "You are a helpful assistant.",  // ← il tuo system prompt
  APPS_SCRIPT_URL: "",  // ← URL del tuo Apps Script (vedi apps_script.gs)
  QUALTRICS_TASK:  "Task_A",                        // ← nome task per Qualtrics postMessage
};
// ════════════════════════════════════════════

// ── Unique session ID ──────────────────────
function generateId(len = 15) {
  return Array.from({ length: len }, () => Math.floor(Math.random() * 10)).join('');
}
const SESSION_ID = generateId();
document.getElementById('session-label').textContent = 'ID: ' + SESSION_ID;

// ── Notify Qualtrics via postMessage ───────
window.parent.postMessage('ID_' + CONFIG.QUALTRICS_TASK + '_' + SESSION_ID, '*');

// ── Conversation state ──────────────────────
let conversation = []; // { role, content, timestamp }

// ── DOM refs ───────────────────────────────
const log       = document.getElementById('conversation-log');
const input     = document.getElementById('user-input');
const sendBtn   = document.getElementById('send-btn');
const typing    = document.getElementById('typing');
const statusTxt = document.getElementById('status-text');
const saveBadge = document.getElementById('save-indicator');

// ── Helpers ────────────────────────────────
function timestamp() {
  return new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}

function setStatus(msg, isError = false) {
  statusTxt.textContent = msg;
  statusTxt.parentElement.className = isError ? 'error' : '';
}

function flashSaveBadge() {
  saveBadge.classList.add('visible');
  setTimeout(() => saveBadge.classList.remove('visible'), 2500);
}

function appendMessage(role, content) {
  const ts = timestamp();
  const wrapper = document.createElement('div');
  wrapper.className = 'msg ' + role;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'TU' : 'ASSISTENTE';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = content;

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = ts;

  wrapper.appendChild(label);
  wrapper.appendChild(bubble);
  wrapper.appendChild(time);

  log.appendChild(wrapper);
  log.scrollTop = log.scrollHeight;

  return { role, content, timestamp: new Date().toISOString() };
}

function setTyping(visible) {
  typing.className = visible ? 'visible' : '';
  if (visible) log.scrollTop = log.scrollHeight;
}

function setInputDisabled(disabled) {
  input.disabled = disabled;
  sendBtn.disabled = disabled;
}

// ── OpenAI call ────────────────────────────
async function getChatbotResponse(messages) {
  const payload = {
    model: CONFIG.OPENAI_MODEL,
    messages: [
      { role: 'system', content: CONFIG.SYSTEM_PROMPT },
      ...messages.map(m => ({ role: m.role, content: m.content }))
    ]
  };

  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + CONFIG.OPENAI_API_KEY
    },
    body: JSON.stringify(payload)
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error((err.error?.message) || 'HTTP ' + res.status);
  }

  const data = await res.json();
  return data.choices[0].message.content;
}

// ── Google Sheets save ─────────────────────
async function saveToSheets(entry) {
  if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.startsWith('YOUR_')) return;
  try {
    await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',               // Apps Script needs no-cors
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId: SESSION_ID,
        role: entry.role,
        content: entry.content,
        timestamp: entry.timestamp
      })
    });
    flashSaveBadge();
  } catch (e) {
    console.warn('Sheets save failed:', e);
  }
}

// Record app launch immediately
async function recordLaunch() {
  if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.startsWith('YOUR_')) return;
  try {
    await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId: SESSION_ID,
        role: 'system',
        content: 'App Launch',
        timestamp: new Date().toISOString()
      })
    });
  } catch (e) {}
}
recordLaunch();

// ── Send message ───────────────────────────
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  setInputDisabled(true);
  setStatus('');

  // Add user message
  const userEntry = appendMessage('user', text);
  conversation.push(userEntry);
  await saveToSheets(userEntry);

  // Show typing
  setTyping(true);
  setStatus('Elaborando risposta…');

  try {
    const reply = await getChatbotResponse(conversation);
    setTyping(false);

    const assistantEntry = appendMessage('assistant', reply);
    conversation.push(assistantEntry);
    await saveToSheets(assistantEntry);
    setStatus('');
  } catch (err) {
    setTyping(false);
    setStatus('Errore: ' + err.message, true);
    console.error(err);
  }

  setInputDisabled(false);
  input.focus();
}

// ── Event listeners ────────────────────────
sendBtn.addEventListener('click', sendMessage);

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});

input.focus();
</script>
</body>
</html>
